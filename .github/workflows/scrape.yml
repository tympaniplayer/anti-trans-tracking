name: Weekly Legislation Scrape

on:
  schedule:
    - cron: '0 6 * * 1'  # 6:00 AM UTC every Monday
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Restore classification cache
        uses: actions/cache@v4
        with:
          path: scraper/cache/
          key: classification-cache-${{ github.run_id }}
          restore-keys: classification-cache-

      - name: Run scraper
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scraper
        run: python scraper.py

      - name: Upload data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legislation-data-${{ github.run_id }}
          path: frontend/data/
          retention-days: 30

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet frontend/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add frontend/data/
          git commit -m "Update legislation data $(date -u +%Y-%m-%d)"
          git push
